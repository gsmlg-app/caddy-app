name: Build

on:
  workflow_dispatch:
    inputs:
      git-ref:
        description: 'Git ref to build (branch, tag, or SHA)'
        required: true
        default: 'main'

env:
  FLUTTER_VERSION: '3.38.5'

concurrency:
  group: ${{ github.workflow }}-${{ inputs.git-ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git-ref }}

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: go/caddy_bridge/go.sum

      - uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: ${{ env.FLUTTER_VERSION }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev libsecret-1-dev

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Build Caddy bridge (Linux)
        run: make -C go/caddy_bridge linux

      - name: Copy Caddy bridge library
        run: |
          mkdir -p linux/libs
          cp go/caddy_bridge/build/libcaddy_bridge.so linux/libs/

      - name: Install tools
        run: dart pub global activate melos

      - name: Prepare project
        run: melos run prepare

      - name: Create native_assets directory
        run: mkdir -p build/native_assets/linux

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux build
        run: |
          cd build/linux/x64/release/bundle
          tar -czvf ../../../../../caddy-app-linux.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: caddy-app-linux
          path: caddy-app-linux.tar.gz
          retention-days: 30

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git-ref }}

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: go/caddy_bridge/go.sum

      - uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: ${{ env.FLUTTER_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Build Caddy bridge (macOS)
        run: make -C go/caddy_bridge macos

      - name: Copy Caddy bridge library
        run: |
          mkdir -p macos/libs
          cp go/caddy_bridge/build/libcaddy_bridge.dylib macos/libs/

      - name: Install tools
        run: dart pub global activate melos

      - name: Prepare project
        run: melos run prepare

      - name: Build macOS
        run: flutter build macos --release

      - name: Package macOS build
        run: |
          cd build/macos/Build/Products/Release
          zip -r ../../../../../caddy-app-macos.zip *.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: caddy-app-macos
          path: caddy-app-macos.zip
          retention-days: 30

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git-ref }}

      - uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: ${{ env.FLUTTER_VERSION }}

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\Pub\Cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Install tools
        run: dart pub global activate melos

      - name: Prepare project
        run: melos run prepare

      - name: Build Windows
        run: flutter build windows --release

      - name: Package Windows build
        run: Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath caddy-app-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: caddy-app-windows
          path: caddy-app-windows.zip
          retention-days: 30

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git-ref }}

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: go/caddy_bridge/go.sum

      - uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: ${{ env.FLUTTER_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android NDK
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.2.12479018" || true
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/27.2.12479018" >> $GITHUB_ENV

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Build Caddy bridge (Android)
        run: make -C go/caddy_bridge android

      - name: Copy Caddy bridge library
        run: cp go/caddy_bridge/build/caddy_bridge.aar android/app/libs/

      - name: Install tools
        run: dart pub global activate melos

      - name: Prepare project
        run: melos run prepare

      - name: Build APK
        run: flutter build apk --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: caddy-app-android
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.git-ref }}

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: go/caddy_bridge/go.sum

      - uses: flutter-actions/setup-flutter@v4
        with:
          channel: stable
          version: ${{ env.FLUTTER_VERSION }}

      - name: Install gomobile
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          gomobile init

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pub-cache
            .dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Build Caddy bridge (iOS)
        run: make -C go/caddy_bridge ios

      - name: Copy Caddy bridge framework
        run: cp -r go/caddy_bridge/build/CaddyBridge.xcframework ios/

      - name: Install tools
        run: dart pub global activate melos

      - name: Prepare project
        run: melos run prepare

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r ../ipa/caddy-app-ios.ipa Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: caddy-app-ios
          path: build/ios/ipa/caddy-app-ios.ipa
          retention-days: 30
